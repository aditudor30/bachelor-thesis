reid:
  root: "/path/to/MTMC_Tracking_2026"
  records_root: "output/final_mvp_exports/yolo11m_medium_conf001_transition/frame_global_records"
  output_root: "output/reid_embeddings/debug_colorhist"
  backend: "color_histogram"
  aggregation: "mean"
  subsets:
    - "official_val"
  scenes:
    - "Warehouse_020"
  camera_ids:
    - "Camera_0000"
  max_crops_per_tracklet: 8
