motion_quality:
  require_3d_motion: true
  allow_suspicious_as_clean: true
  min_valid_3d_points: 3
  min_valid_3d_ratio: 0.4
  general_thresholds:
    suspicious_step_m: 5.0
    invalid_step_m: 10.0
    suspicious_speed_m_per_frame: 5.0
    invalid_speed_m_per_frame: 10.0
    suspicious_travel_per_frame: 2.0
    invalid_travel_per_frame: 4.0
    max_jump_ratio_suspicious: 0.20
    max_jump_ratio_invalid: 0.40
  per_class_thresholds:
    Person:
      suspicious_step_m: 5.0
      invalid_step_m: 10.0
    FourierGR1T2:
      suspicious_step_m: 5.0
      invalid_step_m: 10.0
    AgilityDigit:
      suspicious_step_m: 5.0
      invalid_step_m: 10.0
    Forklift:
      suspicious_step_m: 6.0
      invalid_step_m: 12.0
    PalletTruck:
      suspicious_step_m: 6.0
      invalid_step_m: 12.0
    Transporter:
      suspicious_step_m: 6.0
      invalid_step_m: 12.0
    NovaCarter:
      suspicious_step_m: 6.0
      invalid_step_m: 12.0
