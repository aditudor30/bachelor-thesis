person_reid_dataset:
  name: "person_smartspaces_v1"
  output_root: "output/reid_training/person_smartspaces_v1"
  progress: true
  overwrite: false
  skip_existing: false

paths:
  dataset_root: "/path/to/MTMC_Tracking_2026"

selection:
  class_id: 0
  class_name: "Person"
  splits:
    train:
      split_name: "train"
      scenes:
        - "Warehouse_000"
        - "Warehouse_001"
        - "Warehouse_002"
        - "Warehouse_003"
        - "Warehouse_004"
        - "Warehouse_005"
        - "Warehouse_006"
        - "Warehouse_007"
        - "Warehouse_008"
        - "Warehouse_009"
        - "Warehouse_010"
        - "Warehouse_011"
        - "Warehouse_012"
        - "Warehouse_013"
        - "Warehouse_014"
        - "Warehouse_015"
        - "Warehouse_016"
        - "Warehouse_017"
        - "Warehouse_018"
        - "Warehouse_019"
    val:
      split_name: "val"
      scenes:
        - "Warehouse_020"
        - "Warehouse_021"
        - "Warehouse_022"

crop_extraction:
  frame_stride: 5
  min_bbox_width: 12
  min_bbox_height: 24
  min_bbox_area: 500
  max_crops_per_identity: 200
  jpeg_quality: 95
  save_format: "jpg"
  padding_ratio: 0.05
  clip_to_image: true
  include_val_as_eval_only: true

split:
  split_strategy: "scene_split"
  train_identity_fraction: 0.8
  random_seed: 42

pairs_triplets:
  enabled: true
  max_positive_pairs_per_identity: 50
  max_negative_pairs_per_identity: 100
  max_triplets_per_identity: 100
  prefer_cross_camera_positive: true
  include_same_camera_negative: true
  include_same_scene_negative: true
  random_seed: 42

figures:
  enabled: true
  max_grid_images: 64
  thumbnail_size: 128

diagnostics:
  min_crops_per_identity_warning: 5
  min_identities_warning: 20
