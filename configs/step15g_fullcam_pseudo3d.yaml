step15g:
  name: "baseline_v2_pseudo3d_fullcam_generation"
  output_root: "output/pseudo3d/baseline_v2_pseudo3d_fullcam"
  progress: true

paths:
  dataset_root: "dataset/MTMC_Tracking_2026"
  frame_records_root: "output/final_mvp_exports/yolo11m_medium_conf001_transition/frame_global_records"
  observations_root: "output/pipeline_runs/yolo11m_medium_curriculum_conf001/observations3d"
  class_priors: "output/3d_priors/baseline_v1_geometry_only/priors/class_dimension_priors_final.json"
  raw_output_root: "output/pseudo3d/baseline_v2_pseudo3d_fullcam/predictions_raw"
  stabilized_output_root: "output/pseudo3d/baseline_v2_pseudo3d_fullcam/predictions_stabilized"
  existing_raw_root: "output/pseudo3d/baseline_v2_pseudo3d_isolated/predictions"
  existing_stabilized_root: "output/pseudo3d/baseline_v2_pseudo3d_stabilized/predictions_stabilized"

input_selection:
  source: "frame_global_records"
  subsets:
    - "official_val"
    - "internal_holdout"
    - "test"
  scenes:
    official_val:
      - "Warehouse_020"
      - "Warehouse_021"
      - "Warehouse_022"
    internal_holdout:
      - "Warehouse_014"
      - "Warehouse_015"
      - "Warehouse_016"
    test:
      - "Warehouse_023"
      - "Warehouse_024"
      - "Warehouse_025"
  camera_ids: null

generation:
  skip_existing: true
  overwrite: false
  backend_config: "deep_oc_sort_3d/configs/pseudo3d_isolated_debug.yaml"
  output_format:
    jsonl: true
    csv: true

stabilization:
  skip_existing: true
  overwrite: false
  config: "deep_oc_sort_3d/configs/pseudo3d_stabilization_debug.yaml"
  output_format:
    jsonl: true
    csv: true

coverage:
  min_camera_file_coverage: 0.95
  min_prediction_success_rate: 0.90
  require_metadata_completeness: true
  check_projection: true
  check_smoothness: true

smoothness:
  suspicious_step_m: 3.0
  invalid_step_m: 6.0
  suspicious_dimension_cv: 0.25
  invalid_dimension_cv: 0.50
  yaw_jump_threshold: 1.57

