precheck:
  enabled: true
  require_pass_before_full_rerun: true
  official_val:
    split: "val"
    scenes: ["Warehouse_020", "Warehouse_021", "Warehouse_022"]
  internal_holdout:
    split: "train"
    scenes: ["Warehouse_014", "Warehouse_015", "Warehouse_016"]
  test_probe:
    split: "test"
    scenes: ["Warehouse_023"]

full_rerun:
  enabled: true
  run_if_precheck_passes: true
  subsets:
    official_val:
      split: "val"
      scenes: ["Warehouse_020", "Warehouse_021", "Warehouse_022"]
    internal_holdout:
      split: "train"
      scenes: ["Warehouse_014", "Warehouse_015", "Warehouse_016"]
    test:
      split: "test"
      scenes: ["Warehouse_023", "Warehouse_024", "Warehouse_025"]

bytetrack_style:
  min_confidence_for_input: 0.001
  track_high_thresh: 0.3
  track_low_thresh: 0.05
  new_track_thresh: 0.4
  match_thresh: 0.8
  second_stage_match_thresh: 0.5
  track_buffer: 45
  class_agnostic_tracking: false
  allow_cross_class_matching: false

tracklets:
  use_existing_builder: true
candidates:
  use_existing_builder: true
motion_filtering:
  use_existing_filter: true
global_association:
  mode: "overlap_transition"
  use_reid: false
  use_existing_association: true

validation:
  require_track1_errors_zero: true
  compare_with_baseline_v1: true
  compare_with_baseline_v2_current: true
  compare_with_combined_safe_080: true

selection:
  max_allowed_purity_drop: 0.01
  max_allowed_false_merge_rate_delta: 0.01
  min_track1_row_retention: 0.75
  min_local_record_retention: 0.75
  min_gt_matched_record_retention: 0.75
  min_multi_camera_track_retention: 0.50
  require_track1_valid: true
  prefer_lower_fragmentation: true
  prefer_stable_non_person: true

figures:
  enabled: true
