dataset:
  root: "/path/to/MTMC_Tracking_2026"
  output: "output/yolo_dataset_balanced"
  train_scenes:
    - "Warehouse_000"
    - "Warehouse_001"
    - "Warehouse_002"
    - "Warehouse_003"
    - "Warehouse_004"
  val_scenes:
    - "Warehouse_020"
