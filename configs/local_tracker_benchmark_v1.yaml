local_tracker_benchmark:
  name: "local_tracker_benchmark_v1"
  output_root: "output/local_tracker_benchmark/v1"
  progress: true
  random_seed: 42

paths:
  dataset_root: "/path/to/MTMC_Tracking_2026"
  yolo_pipeline_root: "output/pipeline_runs/yolo11m_medium_curriculum_conf001"
  v2_pipeline_root: "output/pipeline_runs/baseline_v2_pseudo3d_fullcam"
  current_local_tracks_root: "output/local_tracks/baseline_v2_pseudo3d_fullcam"
  bytetrack_repo_root: "/home/cl5-student1/PycharmProjects/PoseTrack1/ByteTrack"
  bytetrack_mot17_weights: "/home/cl5-student1/PycharmProjects/PoseTrack1/ByteTrack/pretrained/bytetrack_x_mot17.pth.tar"
  bytetrack_mot20_weights: "/home/cl5-student1/PycharmProjects/PoseTrack1/ByteTrack/pretrained/bytetrack_x_mot20.tar"
  botsort_repo_root: "/home/cl5-student1/PycharmProjects/PoseTrack1/bot-sort"
  botsort_sbs_mot17_weights: "/home/cl5-student1/PycharmProjects/PoseTrack1/bot-sort/pretrained/mot17_sbs_S50.pth"
  botsort_sbs_mot20_weights: "/home/cl5-student1/PycharmProjects/PoseTrack1/bot-sort/pretrained/mot20_sbs_S50.pth"
  osnet_finetuned_weights: "output/reid_training/osnet_person_smartspaces_v1/checkpoints/best_retrieval_top1.pth"

benchmark:
  subset: "quick"
  quick_scenes:
    val:
      - "Warehouse_020"
    test:
      - "Warehouse_023"
  val_scenes:
    val:
      - "Warehouse_020"
      - "Warehouse_021"
      - "Warehouse_022"
  internal_holdout_scenes:
    train:
      - "Warehouse_014"
      - "Warehouse_015"
      - "Warehouse_016"
  test_scenes:
    test:
      - "Warehouse_023"
      - "Warehouse_024"
      - "Warehouse_025"

trackers:
  run_current_local_tracker: true
  run_bytetrack_style_yolo11m: true
  run_botsort_style_no_reid_yolo11m: true
  run_botsort_sbs_mot17_yolo11m: true
  run_botsort_sbs_mot20_yolo11m: true
  run_botsort_osnet_finetuned_yolo11m: true

detections:
  use_existing_yolo11m_detections: true
  min_confidence_for_input: 0.001
  high_confidence_threshold: 0.3
  low_confidence_threshold: 0.05
  class_agnostic_tracking: false

bytetrack_style:
  track_high_thresh: 0.3
  track_low_thresh: 0.05
  new_track_thresh: 0.4
  match_thresh: 0.8
  track_buffer: 45
  second_stage_match_thresh: 0.5

botsort_style:
  track_high_thresh: 0.3
  track_low_thresh: 0.05
  new_track_thresh: 0.4
  match_thresh: 0.8
  second_stage_match_thresh: 0.5
  proximity_thresh: 0.5
  appearance_thresh: 0.25
  appearance_weight: 0.35
  track_buffer: 45
  use_reid_for_person_only: true

osnet_finetuned:
  input_height: 256
  input_width: 128
  batch_size: 128
  device: "cuda"
  use_amp: true
  max_crops_per_track_update: 1

metrics:
  short_length_thresholds:
    - 1
    - 3
    - 5
  compute_gt_diagnostics_on_train_val: true
  min_iou_for_gt_match: 0.3

downstream_probe:
  enabled: true
  run_on_subset_only: true
  build_tracklets_probe: true
  build_candidates_probe: false
  compute_motion_quality_probe: true

figures:
  enabled: true
