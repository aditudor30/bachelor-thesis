global_mtmc:
  class_must_match: true
  allow_same_camera_links: false
  enable_overlap_association: true
  enable_transition_association: false
  include_singletons: true

  max_frame_delta_for_overlap: 3
  max_mean_overlap_distance: 4.0
  max_median_overlap_distance: 3.5
  max_entry_exit_distance: 5.0
  max_temporal_gap: 90
  max_velocity_angle_deg: 120.0

  overlap_distance_weight: 1.0
  transition_distance_weight: 1.0
  temporal_gap_weight: 0.1
  velocity_weight: 0.05
  confidence_weight: 0.05
  cost_threshold: 1.4

  max_candidates_per_group: null
